description: Alpaca is an API-first commission-free stock and crypto trading broker offering trading, market data, options,
  and broker-as-a-service APIs. Alpaca publishes its OpenAPI specifications publicly via the alpacahq/alpaca-docs GitHub repository,
  with separate specs for Trading, Broker, Market Data, and OAuth.
apis:
- aid: alpaca:trading-api
  name: Alpaca Trading API
  tags:
  - Trading
  - Stocks
  - Options
  - Crypto
  - Orders
  image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
  baseURL: https://api.alpaca.markets/v2
  humanURL: https://docs.alpaca.markets/docs/trading-api
  description: The Alpaca Trading API enables commission-free trading of US-listed equities, options, and crypto. It exposes
    endpoints for orders, positions, account information, watchlists, calendar, clock, and assets. A paper trading sandbox
    is available at paper-api.alpaca.markets.
  properties:
  - type: Documentation
    url: https://docs.alpaca.markets/docs/trading-api
  - type: OpenAPI
    url: openapi/alpaca-trading-api-openapi.yml
  - type: Sandbox
    url: https://paper-api.alpaca.markets/v2
