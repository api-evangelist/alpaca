    url: capabilities/trading-accounts.yaml
  - type: NaftikoCapability
    url: capabilities/trading-calendar.yaml
  - type: NaftikoCapability
    url: capabilities/trading-clock.yaml
  - type: NaftikoCapability
    url: capabilities/trading-orders.yaml
  - type: NaftikoCapability
    url: capabilities/trading-portfolio-history.yaml
  - type: NaftikoCapability
    url: capabilities/trading-positions.yaml
  - type: NaftikoCapability
    url: capabilities/trading-watchlists.yaml
  x-features:
  - Commission-free US equity and options trading
  - Multi-leg options orders
  - Crypto trading 24/7
  - Paper trading environment
  - Account, positions, orders, watchlists endpoints
  x-use-cases:
  - Build automated trading strategies
  - Power retail trading apps
  - Backtest with paper trading sandbox
- aid: alpaca:market-data-api
  name: Alpaca Market Data API
  tags:
  - Market Data
  - Stocks
  - Crypto
  - Options
  - Real-time
  - Historical
  image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
  baseURL: https://data.alpaca.markets
  humanURL: https://docs.alpaca.markets/docs/about-market-data-api
  description: The Alpaca Market Data API delivers real-time and historical pricing data for US stocks (SIP and IEX feeds),
    options (OPRA), and crypto. Supports REST and WebSocket streaming with bars, quotes, trades, snapshots, and corporate
    actions endpoints. 7+ years of historical data available.
  properties:
  - type: Documentation
    url: https://docs.alpaca.markets/docs/about-market-data-api
  - type: OpenAPI
    url: openapi/alpaca-data-api-openapi.yml
  - type: NaftikoCapability
    url: capabilities/data-crypto-pricing-data-api.yaml
  - type: NaftikoCapability
    url: capabilities/data-logo.yaml
  - type: NaftikoCapability
    url: capabilities/data-news.yaml
  - type: NaftikoCapability
    url: capabilities/data-screener.yaml
  - type: NaftikoCapability
    url: capabilities/data-stock-pricing-data-api.yaml
  x-features:
  - Real-time stock quotes via WebSocket
  - OPRA options market data
  - Crypto market data 24/7
  - 7+ years historical OHLCV
  - SIP and IEX feed support
  x-use-cases:
  - Stream live prices into trading bots
  - Backtest strategies with historical bars
  - Power chart and ticker UIs
