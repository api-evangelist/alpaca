publisherName: Alpaca Securities LLC / Alpaca Crypto LLC
serviceCategory: Fintech
billingModel:
  pricingCategory: Subscription + Custom Contract
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Subscription
    - Usage
    - Adjustment
focusColumns:
  ServiceName: Alpaca Market Data and Trading
  ServiceCategory: Fintech
  ProviderName: Alpaca
  PublisherName: Alpaca Securities LLC
  InvoiceIssuerName: Alpaca
  BillingCurrency: USD
  ChargeCategory: Subscription
meters:
  - name: market_data_subscription
    description: Algo Trader Plus market data subscription.
    unit: month
    aggregation: sum
    dimensions:
      - account
  - name: broker_api_contract
    description: Broker API minimums and per-account fees per partner contract.
    unit: contract
    aggregation: sum
    dimensions:
      - partner
principles:
  - name: Visibility
    description: Pull subscription invoices and broker partner monthly billing into FinOps store.
  - name: Allocation
    description: Allocate market data subscription to consuming trading desk or product line.
  - name: Optimization
    description: Right-size between Free and Algo Trader Plus by audit of actual rpm and symbol counts.
  - name: Accountability
    description: Assign a billing owner for the brokerage relationship and review at renewal.
maintainers:
