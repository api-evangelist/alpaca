description: >-
  FinOps view of Alpaca billing. Trading is commission-free; revenue comes from PFOR, margin,
  Algo Trader Plus subscription ($99/month), and Broker API contracts. Customers should treat
  market-data subscriptions and Broker API minimums as the primary cost lines.
sources:
  - https://alpaca.markets/data
