description: >-
  Entity-relationship view of the Alpaca platform derived from the harvested OpenAPI schemas.
  Two account notions coexist — the Broker API Account (a partner's end-customer, addressed by
  account_id in paths) and the Trading API TradeAccount (the caller's own account) — with trading
  entities (orders, positions, watchlists) hanging off either, and market-data entities keyed by
  symbol rather than by id reference.
entities:
  core:
    - {name: Account, id: uuid, note: "Broker API end-customer account (KYC identity, contact, disclosures, agreements, documents)"}
    - {name: TradeAccount, id: uuid, note: "Trading API account (equity, buying power, status)"}
    - {name: Order, id: uuid, note: also carries client_order_id for idempotent submission}
    - {name: Position, id: asset_id+account, note: keyed by symbol or asset_id}
    - {name: Asset, id: uuid, note: "master list of tradable instruments (symbol, exchange, class)"}
    - {name: Watchlist, id: uuid}
    - {name: Activity, id: "id (string)", note: trade + non-trade activities}
    - {name: PortfolioHistory, id: none, note: time-series projection of an account}
  broker:
    - {name: ACHRelationship, id: uuid}
    - {name: Bank, id: uuid}
    - {name: Transfer, id: uuid}
    - {name: Journal, id: uuid, note: JNLC cash / JNLS securities moves between accounts}
    - {name: Document, id: uuid}
    - {name: Event, id: event_id/ulid, note: "AccountStatusEvent, TradeUpdateEvent, TransferStatusEvent, JournalStatusEvent via SSE"}
  market_data:
    - {name: Bar, keyed_by: symbol+timeframe}
    - {name: Quote, keyed_by: symbol}
    - {name: Trade, keyed_by: symbol}
    - {name: Snapshot, keyed_by: symbol}
    - {name: News, id: integer, note: "references symbols[]"}
    - {name: Announcement, id: uuid, note: corporate actions; references initiating/target symbols}
    - {name: Exchange, keyed_by: code}
