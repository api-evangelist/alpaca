          example: '1990-01-01'
        tax_id:
          type: string
          example: 666-55-4321
        tax_id_type:
          $ref: '#/components/schemas/TaxIdType'
        country_of_citizenship:
          type: string
          description: '[ISO 3166-1 alpha-3](https://www.iso.org/iso-3166-country-codes.html).

            '
          example: USA
        country_of_birth:
          type: string
          description: '[ISO 3166-1 alpha-3](https://www.iso.org/iso-3166-country-codes.html).

            '
          example: USA
        country_of_tax_residence:
          type: string
          description: '[ISO 3166-1 alpha-3](https://www.iso.org/iso-3166-country-codes.html).

            '
          example: USA
        funding_source:
          type: array
          items:
            type: string
            enum:
