        maintenance_margin:
          type: string
          example: '12345.6789'
          format: decimal
          description: Maintenance margin requirement (continuously updated value)
        last_maintenance_margin:
          type: string
          example: '12345.6789'
          format: decimal
          description: Maintenance margin requirement on the previous trading day
