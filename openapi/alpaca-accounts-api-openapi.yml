        bank_account_number:
          type: string
          minLength: 1
        bank_routing_number:
          type: string
          minLength: 1
        nickname:
          type: string
          minLength: 1
      required:
      - id
      - created_at
      - updated_at
      - account_id
      - status
      - account_owner_name
  responses:
    NotAuthorized:
      description: Client is not authorized for this operation.
      content:
