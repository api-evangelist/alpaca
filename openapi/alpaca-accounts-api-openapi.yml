      schema:
        type: string
        enum:
        - asc
        - desc
        example: desc
    AccountID:
      name: account_id
      in: path
      required: true
      description: Account identifier.
      schema:
        type: string
        format: uuid
    Sort:
      name: sort
      in: query
      description: The chronological order of response based on the submission time. asc or desc. Defaults to desc.
      schema:
        type: string
        enum:
        - asc
        - desc
        example: desc
    ActivityType:
      in: path
      name: activity_type
      required: true
      schema:
        type: string
        enum:
        - FILL
        - ACATC
        - ACATS
        - CIL
        - CSD
        - CSW
        - DIV
        - DIVCGL
        - DIVCGS
        - DIVNRA
        - DIVROC
        - DIVTXEX
        - FEE
        - INT
        - JNLC
        - JNLS
        - MA
        - PTC
        - REORG
        - SPIN
        - SPLIT
      description: see ActivityType model for details about what the different types mean
  securitySchemes:
    BasicAuth:
      type: http
