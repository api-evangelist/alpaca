source: mcp/alpaca-mcp.yml (published Trading MCP tool list) x openapi/*.yml operationIds
description: >-
  Binds each Alpaca Trading MCP Server tool to the backing OpenAPI operation(s) in this repo, so a
  tool inherits its real input contract (parameters + requestBody) from the spec. The Trading MCP v2
  is itself spec-derived (FastMCP + OpenAPI), so bindings are mostly direct name/semantics matches.
  The hosted Broker MCP Server's tool schema is OAuth-gated (tools/list returns 401 anonymously),
  so its tools are not enumerated here. Tools with no backing operation in the harvested specs are
  recorded in mcp_only[] — newer Market Data surfaces (options data, orderbooks, fixed income,
  indices, locates, most-actives) postdate the harvested specs.
surfaces:
  openapi: openapi/ (25 specs, 218 operations; Trading v2 + Broker v1 + Market Data + OAuth)
  mcp:
    trading: alpaca-mcp-server (stdio, PyPI) — tool list published in README; schemas spec-derived server-side
    broker: https://broker-api.alpaca.markets/mcp — tools/list auth-gated (OAuth via authx.alpaca.markets)
  graphql: none
