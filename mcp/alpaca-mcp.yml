generated: '2026-07-22'
method: searched
status: published
source: https://github.com/alpacahq/alpaca-mcp-server + https://docs.alpaca.markets/us/docs/alpaca-mcp-server.md + https://docs.alpaca.markets/us/docs/broker-mcp-server.md
servers:
  - name: alpaca-trading-mcp
    description: >-
      Official MCP server for Alpaca's Trading API — stocks, ETFs, options, crypto, portfolio
      management, and market data through natural language. V2 is a complete rewrite built with
      FastMCP and OpenAPI; tools are spec-derived with overrides. Tool filtering via the
      ALPACA_TOOLSETS env var. No hosted remote endpoint for the Trading MCP — run locally
      (uvx alpaca-mcp-server) or self-host.
    transport: stdio
    package: alpaca-mcp-server            # PyPI, v2.1.1
    install: uvx alpaca-mcp-server
    repository: https://github.com/alpacahq/alpaca-mcp-server
    docs: https://docs.alpaca.markets/us/docs/alpaca-mcp-server
    auth:
      type: apiKey
      env: [ALPACA_API_KEY, ALPACA_SECRET_KEY]
      note: Free paper-trading keys from the Alpaca dashboard work.
  - name: alpaca-broker-mcp
    description: >-
      Hosted (remote) MCP server for the Broker API, in beta for select broker partners. OAuth
      authorization through the Broker Dashboard (super users only). Includes built-in OpenAPI
      discovery tools, curated docs lookup, and a create_sandbox_account tool for synthetic
      sandbox accounts with KYC/account-status fixture outcomes.
    transport: http
    url: https://broker-api.alpaca.markets/mcp
    sandbox_url: https://broker-api.sandbox.alpaca.markets/mcp
    docs: https://docs.alpaca.markets/us/docs/broker-mcp-server
    plugins: https://github.com/alpacahq/agentic   # Cursor / Claude Code plugin marketplace
    auth:
      type: oauth2
      authorization_server: https://authx.alpaca.markets/v1
      resource_metadata: well-known/alpaca-broker-oauth-protected-resource-mcp.json
      note: >-
        tools/list returns 401 unauthorized anonymously — the live tool schema is auth-gated
        and requires an authorized Broker Dashboard OAuth grant to introspect.
