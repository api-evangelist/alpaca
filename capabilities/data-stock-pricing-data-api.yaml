    - name: v2-stocks-trades-latest
      path: /v2/stocks/trades/latest
      operations:
      - name: getlatesttradesformultiplestocksymbols
        method: GET
        description: Get Latest Trades data for multiple stock symbols
        outputRawFormat: json
        outputParameters:
