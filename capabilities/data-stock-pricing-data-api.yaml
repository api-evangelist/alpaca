          type: object
          value: $.
    - name: v2-stocks-symbol-bars
      path: /v2/stocks/{symbol}/bars
      operations:
      - name: getbarsforstocksymbol
        method: GET
        description: Bars
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v2-stocks-symbol-bars-latest
