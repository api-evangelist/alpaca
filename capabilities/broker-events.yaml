      path: /v1/events/accounts/status
      operations:
      - name: suscribetoaccountstatussse
        method: GET
        description: Subscribe to account status events (SSE).
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: since
          in: query
          type: string
          description: 'Format: YYYY-MM-DD'
        - name: until
          in: query
          type: string
          description: 'Format: YYYY-MM-DD'
        - name: since_id
          in: query
          type: integer
        - name: until_id
          in: query
          type: integer
    - name: v1-events-journals-status
      path: /v1/events/journals/status
      operations:
      - name: subscribetojournalstatussse
        method: GET
        description: Subscribe to journal events (SSE).
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: since
          in: query
          type: string
          description: 'Format: YYYY-MM-DD'
        - name: until
          in: query
          type: string
          description: 'Format: YYYY-MM-DD'
        - name: since_id
          in: query
          type: integer
        - name: until_id
          in: query
          type: integer
    - name: v1-events-trades
