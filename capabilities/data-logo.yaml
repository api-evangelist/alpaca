naftiko: 1.0.0-alpha2
info:
  label: Market Data API — Logo
  description: 'Market Data API — Logo. 1 operations. Lead operation: Get Logo for symbol. Self-contained Naftiko capability
    covering one Alpaca business surface.'
  tags:
  - Alpaca
  - Logo
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ALPACA_API_KEY: ALPACA_API_KEY
capability:
  consumes:
  - type: http
    namespace: data-logo
    baseUri: https://data.alpaca.markets
    description: Market Data API — Logo business capability. Self-contained, no shared references.
    resources:
    - name: v1beta1-logos-crypto_or_stock_symbol
      path: /v1beta1/logos/{crypto_or_stock_symbol}
      operations:
      - name: getlogoforsymbol
        method: GET
        description: Get Logo for symbol
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: placeholder
          in: query
          type: boolean
          description: If true then the api will generate a placeholder image if no logo was found. Defaults to true
    authentication:
      type: apikey
      key: APCA-API-KEY-ID
      value: '{{env.ALPACA_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: data-logo-rest
    port: 8080
    description: REST adapter for Market Data API — Logo. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/v1beta1/logos/{crypto-or-stock-symbol}
      name: v1beta1-logos-crypto-or-stock-symbol
      description: REST surface for v1beta1-logos-crypto_or_stock_symbol.
      operations:
      - method: GET
        name: getlogoforsymbol
        description: Get Logo for symbol
        call: data-logo.getlogoforsymbol
        with:
          placeholder: rest.placeholder
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: data-logo-mcp
    port: 9090
    transport: http
    description: MCP adapter for Market Data API — Logo. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: get-logo-symbol
      description: Get Logo for symbol
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: data-logo.getlogoforsymbol
      with:
        placeholder: tools.placeholder
      outputParameters:
      - type: object
        mapping: $.
