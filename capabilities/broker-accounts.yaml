          value: $.
    - name: v1-accounts-account_id-transfers
      path: /v1/accounts/{account_id}/transfers
      operations:
      - name: gettransfersforaccount
        method: GET
        description: Return a list of transfers for an account.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
