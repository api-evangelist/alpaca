          in: query
          type: string
          description: INCOMING or OUTGOING
        - name: limit
          in: query
          type: integer
        - name: offset
          in: query
          type: integer
      - name: createtransferforaccount
        method: POST
        description: Request a new transfer
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: account_id
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: v1-accounts-account_id-transfers-transfer_id
      path: /v1/accounts/{account_id}/transfers/{transfer_id}
      operations:
      - name: deletetransfer
